<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="icon.png">
  <title>Add-Ons</title>
<style>
body, html {
  height: 100%;
  margin: 0;
  font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif
  
}

body {
  background-color: #222222;
}

.hero-image {
  display: flex;
  align-items: center;
  justify-content: center;
  background-image: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url("https://i.imgur.com/6RWUWyF.png");
  height: 25%;
  background-position: center;
  background-repeat: no-repeat;
  background-size: cover;
  position: relative;
}

.name {
  width: 250px;
  height: 250px;
  background-image: url("bannerimg.png");
  background-repeat: no-repeat;
  background-size: contain;
  background-position: center;
  display: flex;
  align-items: center;
  justify-content: center;
}

nav {
  background-color: #333333;
  padding: 0px;
  position: sticky;
  top: 0;
  z-index: 1;
  box-shadow: 0px 5px 5px rgba(0, 0, 0, 0.25);
}

nav ul {
  list-style-type: none;
  list-style: none;
  margin: 0;
  padding: 0;
}

nav ul li {
  display: inline;
  padding: 0px;
  margin-left: 2px;
}

nav ul li button {
  background-color: #333333;
  border: none;
  cursor: pointer;
  padding: 12px 10px;
  text-decoration: none;
  color: white;
  transition: background-color 0.3s;
}

nav ul li button:hover {
  padding: 12px 10px;
  background-color: #111111;
}

nav ul li2 {
  display: inline;
  padding: 0px;
  margin-right: 2px;
  float: right;
}

nav ul li2 button {
  background-color: #333333;
  border: none;
  cursor: pointer;
  padding: 12px 10px;
  text-decoration: none;
  color: white;
  transition: background-color 0.3s;
}

nav ul li2 button:hover {
  padding: 12px 10px;
  background-color: #111111;
}

main {
  margin: 20px;
  color: white;
  text-align: center;
}

main p {
  margin: 2px;
  text-align: center;
}

header {
    font-size: 50px;
    font-weight: bold;
}

.imgblock {
  position: relative;
  display: inline-flex;
}

.img-text {
  position: absolute;
  bottom: 5%;
  left: 10%;
  text-align: left;
  color: white;
  opacity: 0;
  transition: all 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
}

.img-text h1 {
  font-size: 30px;
  margin-bottom: 10px;
}

.img-text h3 {
  margin-top: 10px;
}

.img-text-large {
  position: absolute;
  bottom: 5%;
  left: 5%;
  text-align: left;
  color: white;
  opacity: 0;
  transition: all 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
}

.img-text-large h1 {
  font-size: 30px;
  margin-bottom: 10px;
}

.img-text-large h3 {
  margin-top: 10px;
}

.imgblock:hover .img-text {
  opacity: 1;
}

.imgblock:hover .img-text-large {
  opacity: 1;
}

img, video {
  margin: 25px;
  box-shadow: 2px 2px 5px #111111;
  transition: all 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
}

img:hover, video:hover {
  transform: scale(1.02);
  box-shadow: 10px 10px 25px #111111;
}

/* Media query for mobile devices */
@media only screen and (max-width: 1200px) {
  /* Stack images vertically */
  img, video {
    height: auto;
    max-width: 90%;
  }
}

/* Media query for desktop and tablet devices */
@media only screen and (min-width: 1201px) {
  img, video {
    height: 400px;
    width: auto;
    max-height: 90% ;
    max-width: 90%;
  }
}

.buy-button {
  background-color: #333333;
  border: none;
  cursor: pointer;
  padding: 15px 10px;
  font-size: 25px;
  font-weight: bold;
  text-decoration: none;
  color: white;
  width: 50%;
  box-shadow: 5px 5px 5px rgba(0, 0, 0, 0.25);
  transition: background-color 0.3s;
}

.buy-button:hover {
  background-color: #111111;
}

.divider {
  margin-top: 10px;
  margin-bottom: 10px;
  border: none;
  border-top: 5px solid #333333;
}

footer {
  background-color: #333333;
  color: white;
  padding: 2px;
  text-align: center;
}

.sticky {
  position: fixed;
  width: 100%;
  top: 0;
}
</style>
</head>

<body>
  <div class="hero-image">
    <div class="name">
    </div>
  </div>

  <nav>
    <ul>
      <li><button onclick="window.location.href='index.html'">Home</button></li>
      <li><button onclick="window.location.href='renders.html'">Renders</button></li>
      <li><button onclick="window.location.href='models.html'">Models</button></li>
      <li><button onclick="window.location.href='textures.html'">Textures</button></li>
      <li><button onclick="window.location.href='addons.html'">Add-ons</button></li>
      <li2><button onclick="window.location.href='about.html'">About</button></li2>
      <li2><button onclick="window.location.href='contact.html'">Contact</button></li2>
    </ul>
  </nav>

  <script>
    window.addEventListener('scroll', function() {
      var nav = document.querySelector('nav');
      var heroImage = document.querySelector('.hero-image');
      var heroImageBottom = heroImage.offsetTop + heroImage.offsetHeight;

      nav.classList.toggle('sticky', window.scrollY > heroImageBottom);
    });
  </script>

  <main>
    <header>Add-ons</header>
  </main>

  <footer>
    <p>&copy; 2023 baeac. All rights reserved.</p>
  </footer>
</body>
</html>
