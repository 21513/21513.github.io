    <div class="search-bar">
        <input class="search-input" type="text" id="searchInput" placeholder="Search textures..." onkeypress="handleKeyPress(event)">
        <button class="search-button" onclick="search()">&#x1F50E;&#xFE0E;</button>
    </div>

    <script>
        function search() {
            var input, filter, assetContainer, assets, i, img, fileName;
            input = document.getElementById("searchInput");
            filter = input.value.toUpperCase();
            assetContainer = document.getElementById("assetContainer");
            assets = assetContainer.getElementsByClassName("alpha");

            for (i = 0; i < assets.length; i++) {
                img = assets[i].getElementsByTagName("img")[0];
                fileName = img.alt;
                if (fileName.toUpperCase().indexOf(filter) > -1) {
                    assets[i].style.display = "";
                } else {
                    assets[i].style.display = "none";
                }
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                search();
            }
        }
    </script>

        function createAssetLink(fileName) {
            const div = document.createElement("div");
            div.classList.add("alpha");
            const a = document.createElement("a");
            a.href = "assets/" + fileName;
            a.download = "";
            const img = document.createElement("img");
            img.src = "assets/" + fileName;
            img.alt = fileName;
            a.appendChild(img);
            div.appendChild(a);
            return div;
        }

        const assetContainer = document.getElementById("assetContainer");
        fileNames.forEach(fileName => {
            assetContainer.appendChild(createAssetLink(fileName));
        });
